name: Yamete
options:
  bundleIdPrefix: com.studnicky
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.4"
  createIntermediateGroups: true
  defaultConfig: Debug

configs:
  Debug: debug
  DebugDirect: debug
  ReleaseAppStore: release
  ReleaseDirect: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    DEVELOPMENT_LANGUAGE: en
    PRODUCT_BUNDLE_IDENTIFIER: com.studnicky.yamete
    MARKETING_VERSION: "1.0.1"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_HARDENED_RUNTIME: true
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

packages:
  Yamete:
    path: .

targets:
  Yamete:
    type: application
    platform: macOS
    sources:
      - path: Sources/YameteApp/YameteApp.swift
      - path: App/Resources
        buildPhase: resources
    dependencies:
      - package: Yamete
        product: YameteApp
      - package: Yamete
        product: YameteCore
      - package: Yamete
        product: SensorKit
      - package: Yamete
        product: ResponseKit
      - sdk: IOKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreAudio.framework
      - sdk: CoreMotion.framework
      - sdk: ServiceManagement.framework
      - sdk: SwiftUI.framework
      - sdk: AppKit.framework
    settings:
      base:
        PRODUCT_NAME: Yamete
        EXECUTABLE_NAME: yamete
        PRODUCT_BUNDLE_IDENTIFIER: com.studnicky.yamete
        INFOPLIST_FILE: App/Config/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/Config/AppStore.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        SWIFT_INCLUDE_PATHS: "$(SRCROOT)/Sources/IOHIDPublic/include"
        HEADER_SEARCH_PATHS: "$(SRCROOT)/Sources/IOHIDPublic/include"
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        DebugDirect:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG DIRECT_BUILD"
          PRODUCT_NAME: Yamete Direct
          EXECUTABLE_NAME: yamete-direct
          PRODUCT_BUNDLE_IDENTIFIER: com.studnicky.yamete.direct
          CODE_SIGN_ENTITLEMENTS: App/Config/Direct.entitlements
        ReleaseAppStore:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          DEAD_CODE_STRIPPING: true
          STRIP_INSTALLED_PRODUCT: true
          STRIP_SWIFT_SYMBOLS: true
          CODE_SIGN_ENTITLEMENTS: App/Config/AppStore.entitlements
        ReleaseDirect:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
          SWIFT_COMPILATION_MODE: wholemodule
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DIRECT_BUILD
          DEAD_CODE_STRIPPING: true
          STRIP_INSTALLED_PRODUCT: true
          STRIP_SWIFT_SYMBOLS: true
          PRODUCT_NAME: Yamete Direct
          EXECUTABLE_NAME: yamete-direct
          PRODUCT_BUNDLE_IDENTIFIER: com.studnicky.yamete.direct
          CODE_SIGN_ENTITLEMENTS: App/Config/Direct.entitlements

  YameteTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Yamete
      - package: Yamete
        product: YameteCore
      - package: Yamete
        product: SensorKit
      - package: Yamete
        product: ResponseKit
      - package: Yamete
        product: YameteApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.studnicky.yamete.tests

schemes:
  Yamete-AppStore:
    build:
      targets:
        Yamete: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - YameteTests
    profile:
      config: ReleaseAppStore
    analyze:
      config: Debug
    archive:
      config: ReleaseAppStore

  Yamete-Direct:
    build:
      targets:
        Yamete: all
    run:
      config: DebugDirect
    test:
      config: DebugDirect
      targets:
        - YameteTests
    profile:
      config: ReleaseDirect
    analyze:
      config: DebugDirect
    archive:
      config: ReleaseDirect

fileGroups:
  - App
  - Assets
  - docs
