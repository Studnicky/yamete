name: CI

on:
  push:
    branches: ['**']
  pull_request:

# Least-privilege default for every job below. The CI workflow only reads the
# repo and runs local build/test commands; no write access is needed.
# Closes CodeQL actions/missing-workflow-permissions alerts (#1, #2, #4).
permissions:
  contents: read

# Cancel in-progress CI runs for the same ref when a new push lands. Saves
# runner minutes and stops stale builds from racing newer ones. Not applied
# to the `master` ref (the default branch keeps every run visible).
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  actionlint:
    name: Lint workflow YAML
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  lint:
    name: Lint (strict concurrency)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Type-check with strict concurrency
        run: make lint

  build:
    name: Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Build Direct bundle
        run: make build
      - name: Build App Store bundle
        run: make appstore
      - name: Verify bundle contents
        run: |
          test -f "dist/Yamete Direct.app/Contents/MacOS/yamete-direct"
          test -f "dist/Yamete Direct.app/Contents/Info.plist"
          test -f "dist/Yamete.app/Contents/MacOS/yamete"
          test -f "dist/Yamete.app/Contents/Info.plist"
          test -d "dist/Yamete.app/Contents/Resources/faces"
          test -d "dist/Yamete.app/Contents/Resources/sounds"
          FACE_COUNT=$(find "dist/Yamete.app/Contents/Resources/faces" -type f \( -name '*.svg' -o -name '*.png' -o -name '*.jpg' \) | wc -l | tr -d ' ')
          SOUND_COUNT=$(find "dist/Yamete.app/Contents/Resources/sounds" -type f \( -name '*.mp3' -o -name '*.wav' -o -name '*.m4a' \) | wc -l | tr -d ' ')
          echo "Faces: $FACE_COUNT, Sounds: $SOUND_COUNT"
          test "$FACE_COUNT" -ge 1
          test "$SOUND_COUNT" -ge 1

  test:
    name: Test
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      # Route through Makefile so local `make test` and CI stay in sync.
      - name: Run tests
        run: make test
