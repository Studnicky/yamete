name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

# Node.js 20 is scheduled to be removed from GitHub Actions runners
# on 2026-09-16. softprops/action-gh-release currently ships on Node 20,
# so opt this workflow into Node 24 ahead of the forced migration.
# Remove this env block once every action in the workflow ships on
# Node 24 (or later) by default.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# Releases are singletons per tag — never cancel a tagged build. Use the
# concurrency group for observability but keep `cancel-in-progress: false`.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v5

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: brew install yq

      - name: Verify tag version matches project.yml
        run: |
          PROJECT_VERSION=$(yq -r '.settings.base.MARKETING_VERSION' project.yml)
          TAG_VERSION="${{ steps.version.outputs.version }}"
          if [[ "$PROJECT_VERSION" != "$TAG_VERSION" ]]; then
            echo "::error::project.yml MARKETING_VERSION ($PROJECT_VERSION) does not match tag version ($TAG_VERSION)"
            exit 1
          fi
          echo "version check passed: $TAG_VERSION"

      - name: Run tests
        run: make test

      - name: Build DMG (Direct variant)
        run: make dmg

      - name: Compute SHA256 of DMG
        id: checksum
        run: |
          SHA256=$(shasum -a 256 "dist/Yamete Direct.dmg" | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          awk "/^## \[${version}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md > /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "---" >> /tmp/release_notes.md
          echo "SHA256: ${{ steps.checksum.outputs.sha256 }}" >> /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: dist/Yamete Direct.dmg
          generate_release_notes: false
