name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Run tests
        run: swift test

      - name: Update Info.plist version
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${{ steps.version.outputs.version }}" Bundle/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${{ github.run_number }}" Bundle/Contents/Info.plist

      - name: Build DMG
        run: make dmg

      - name: Compute SHA256 of DMG
        id: checksum
        run: |
          SHA256=$(shasum -a 256 dist/Yamete.dmg | awk '{print $1}')
          echo "sha256=$SHA256" >> "$GITHUB_OUTPUT"
          echo "SHA256: $SHA256"

      - name: Extract changelog for this version
        id: changelog
        run: |
          version="${{ steps.version.outputs.version }}"
          awk "/^## \[${version}\]/{found=1; next} /^## \[/{found=0} found" CHANGELOG.md > /tmp/release_notes.md
          echo "" >> /tmp/release_notes.md
          echo "---" >> /tmp/release_notes.md
          echo "SHA256: ${{ steps.checksum.outputs.sha256 }}" >> /tmp/release_notes.md
          cat /tmp/release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: /tmp/release_notes.md
          files: dist/Yamete.dmg
          generate_release_notes: false
