name: Host-app test

# Phase 2 CI wiring (Phase 1 host-app companion): runs the
# YameteHostTest xcodebuild scheme so cells that XCTSkip under
# raw `swift test` (UN center, full Haptic engine, CGEvent.post under
# Accessibility, Force-Touch trackpad probes) execute their Real-driver
# halves inside a real `Yamete.app` bundle. Hardware-gated cells
# (Force Touch trackpad, keyboard backlight, on-bus accelerometer)
# self-skip via XCTSkip when the runner lacks the hardware — the
# existing test bundle already handles this, no flag needed.

on:
  # Restricted to master only. The 2-hour host-app xcodebuild lane on
  # macos-15 was burning CI minutes on every feature PR to assert
  # error-handling paths on a hardware-absent runner; actual feature
  # validation already runs in `swift test`. The pre-push hook
  # (.githooks/pre-push → scripts/check-host-app-tests-fresh.sh) is
  # the local gate that release/* and hotfix/* branches cannot be
  # pushed without a fresh local host-app integration check, so CI
  # only needs to re-run host-app once at the master merge moment.
  # Manual reruns via `workflow_dispatch` for ad-hoc validation.
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: host-app-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  host-app-test:
    name: make test-host-app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Install xcodegen
        # Yamete.xcodeproj is gitignored; project.yml is the source of
        # truth and `make test-host-app` regenerates the project on the
        # fly via xcodegen.
        run: brew install xcodegen
      - name: Run host-app xcodebuild test
        run: make test-host-app
      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: host-app-test-results
          path: |
            **/*.xcresult
          retention-days: 7
