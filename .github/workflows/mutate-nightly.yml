name: Mutate nightly

# Phase 2.1 sustainability: the full 112-entry mutation catalog used to
# run on every PR push, costing ~20 minutes wall-clock at ~5–10 s/entry.
# That blocked iteration. Instead the per-PR `Test` workflow runs a
# slice (only mutations whose targetFile was touched on the branch),
# and this workflow runs the FULL catalog on a nightly cron + every push
# to master/develop so drift never escapes review for more than ~24h.
#
# Failure-loud strategy: if the full catalog regresses, this workflow
# opens a tracking issue tagged `mutation-catalog-regression`, attaches
# the runner log, and stays red until the issue is closed and the
# catalog is back to total == caught. We intentionally do NOT auto-close
# previously-opened regression issues — a maintainer must triage and
# close manually so an intermittent runner-state false-positive does
# not silently hide a real escape.

on:
  schedule:
    # Daily 08:00 UTC. Lands before US-east morning standup so any
    # overnight regression is visible before the working day starts.
    - cron: '0 8 * * *'
  push:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

concurrency:
  group: mutate-nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  mutate-nightly:
    name: make mutate (full catalog)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
      - name: Resolve Xcode version
        id: xcode
        run: echo "version=$(xcodebuild -version | head -1 | awk '{print $2}')" >> "$GITHUB_OUTPUT"
      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-mutate-nightly-${{ runner.os }}-xcode${{ steps.xcode.outputs.version }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: |
            spm-mutate-nightly-${{ runner.os }}-xcode${{ steps.xcode.outputs.version }}-
      - name: Run full mutation catalog
        id: mutate
        run: make mutate 2>&1 | tee mutate.log
      - name: Upload mutate log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: mutate-nightly-log
          path: mutate.log
          retention-days: 30
      - name: Open tracking issue on failure
        if: failure() && github.event_name == 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const title = `mutation-catalog-regression: nightly run ${context.runId} failed`;
            // Search for an existing open regression issue so we don't
            // spam one per nightly during a sustained outage.
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open',
              labels: 'mutation-catalog-regression',
              per_page: 5,
            });
            const body = [
              `Nightly \`make mutate\` regression on ${context.sha}.`,
              ``,
              `Workflow run: https://github.com/${owner}/${repo}/actions/runs/${context.runId}`,
              ``,
              `Triage:`,
              `1. Pull the \`mutate-nightly-log\` artifact.`,
              `2. Identify the ESCAPED mutation id(s).`,
              `3. Either fix the test cell that no longer catches the mutation,`,
              `   or remove the catalog entry if the production gate it covered`,
              `   was intentionally retired.`,
              `4. Close this issue once \`make mutate\` returns total == caught.`,
            ].join('\n');
            if (existing.data.length === 0) {
              await github.rest.issues.create({
                owner, repo, title, body,
                labels: ['mutation-catalog-regression'],
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo,
                issue_number: existing.data[0].number,
                body,
              });
            }
